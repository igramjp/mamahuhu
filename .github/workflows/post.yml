name: post-to-x

# mamahuhu-post リポジトリから統合(2026-07)。
# 元リポジトリの workflow は disabled_manually で停止済み。
on:
  schedule:
    # 金・土 20:00 JST = 11:00 UTC: 前日ポスト(翌日重賞の期待値分析)
    # 当日18:00のスクレイプ+再生成コミット後に走る
    - cron: "0 11 * * 5,6"
    # 火 20:00 JST = 11:00 UTC: 結果検証ポスト(rawdb取り込み+再生成の後)
    - cron: "0 11 * * 2"
  workflow_dispatch:
    inputs:
      mode:
        description: "投稿モード"
        type: choice
        default: preview
        options:
          - preview   # 前日ポスト
          - verify    # 結果検証ポスト
      dry_run:
        description: "実投稿せずログだけ出す"
        type: boolean
        default: false
      date:
        description: "テスト用: 実行日付を YYYYMMDD で上書き (例: 20260628)"
        type: string
        required: false

concurrency:
  group: post-to-x
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run post.py
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          TZ: Asia/Tokyo
        run: |
          # 火曜スケジュール or mode=verify なら結果検証ポスト
          MODE_FLAG=""
          if [ "${{ github.event.schedule }}" = "0 11 * * 2" ] || [ "${{ inputs.mode }}" = "verify" ]; then
            MODE_FLAG="--verify"
          fi
          python poster/post.py $MODE_FLAG ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
