name: Daily Scrape

on:
  schedule:
    # 土日18時JST = 09:00 UTC に実行(realtime取得、当日分)
    # 最終Rが16:30前後で終わってから1時間〜90分後。realtime/dbともに脚質は
    # 前走から算出するため、bias計算は同じ結果になる。
    - cron: '0 9 * * SAT,SUN'
    # 金曜18時JST = 金曜09:00 UTC → 直近開催日(=前週日曜)の notable_race のみ
    # 埋め直し。日曜scrape時点では翌週末の出馬表が未公開で None のままなので、
    # 翌日(土)の出馬表が出揃った金曜夕方に取得する。
    - cron: '0 9 * * FRI'
    # 火曜18時JST = 09:00 UTC → 前週末の生データを db.netkeiba.com から
    # data/keiba.db に取り込む(長期ベースライン・予想モデル用)。
    # db側への反映が火曜頃のためこのタイミング。
    - cron: '0 9 * * TUE'
  # 手動実行: mode=weekend(当日realtime)/rebuild(前週末をdbで取り直し)
  #          /notable(翌週末出馬表)/rawdb(keiba.dbへ前週末取り込み)
  # 月曜祝日開催等は weekend、realtime取得が壊れた場合は rebuild。
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        default: 'weekend'
        required: true
        type: choice
        options:
          - weekend
          - rebuild
          - notable
          - rawdb

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper (weekend realtime)
        if: github.event.schedule == '0 9 * * SAT,SUN' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'weekend')
        run: |
          # 当日分をrealtime取得(keiba.dbへ暫定品質で取り込み+notable更新)。
          # その後 rebuild_site.py が当日ぶんの bias3/pred を site.db に生成する。
          # realtime品質は火曜の rawdb 取り込み+再生成でdb品質に上書きされる。
          TARGET_DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          python scraper/scrape.py "$TARGET_DATE"
          python scraper/rebuild_site.py --from "$TARGET_DATE"
          # 翌日の前日オッズスナップショット(土曜夕方→日曜ぶん)。
          # 20時の前日ポストが注目馬の実名を載せるのに使う。失敗しても継続。
          TOMORROW=$(TZ=Asia/Tokyo date -d tomorrow +%Y%m%d)
          python scraper/odds.py --date "$TOMORROW" || echo "前日オッズ取得失敗(継続)"
          # 翌日(日曜)の順方向予想をサイトへ(発走前の期待値分析)。
          # これで日曜朝までに日曜分が公開される。翌日開催なしなら何もしない。
          python scraper/rebuild_site.py --forward "$TOMORROW" || echo "順方向予想の生成失敗(継続)"

      - name: Run scraper (db rebuild, manual)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'rebuild'
        run: |
          # 手動rebuild: realtime取得が壊れた/取りこぼした時のfallback。
          # 前週末分(直近の土・日)を db.netkeiba.com から取り直して上書き。
          SAT=$(TZ=Asia/Tokyo date -d '3 days ago' +%Y%m%d)
          SUN=$(TZ=Asia/Tokyo date -d '2 days ago' +%Y%m%d)
          python scraper/scrape.py "$SAT"
          python scraper/scrape.py "$SUN"
          python scraper/rebuild_site.py --from "$SAT"

      - name: Run scraper (notable_race update)
        if: github.event.schedule == '0 9 * * FRI' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'notable')
        run: |
          # 直近開催日(=前週日曜)の各場データについて、翌日(土)の出馬表が
          # 公開されていれば notable_race を埋め直す。全レース再scrape はしない。
          python scraper/scrape.py --notable-only
          # 翌日(土曜)の前日オッズスナップショット。金曜20時の前日ポストが使う。
          TOMORROW=$(TZ=Asia/Tokyo date -d tomorrow +%Y%m%d)
          python scraper/odds.py --date "$TOMORROW" || echo "前日オッズ取得失敗(継続)"
          # 翌日(土曜)の順方向予想をサイトへ(発走前の期待値分析)。
          # これで土曜朝までに土曜分が公開される。
          python scraper/rebuild_site.py --forward "$TOMORROW" || echo "順方向予想の生成失敗(継続)"

      - name: Backfill raw data into keiba.db (Tuesday)
        if: github.event.schedule == '0 9 * * TUE' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'rawdb')
        run: |
          # 前週末(直近8日)の生データを db.netkeiba.com から data/keiba.db へ。
          # 週末のrealtime暫定行はdb品質で取り直され(existing_race_idsが除外)、
          # 再生成で site.db 側も通過順・確定オッズ入りにアップグレードされる。
          FROM=$(TZ=Asia/Tokyo date -d '8 days ago' +%Y%m%d)
          python scraper/backfill.py --from "$FROM"
          python scraper/rebuild_site.py --from "$FROM"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/ data/
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "data: $(TZ=Asia/Tokyo date +%Y-%m-%d) auto-update"
            git push
          fi
