# Netlify config

[build]
  publish = "public"

# ===== メンテナンスモード =====
# 新アルゴリズム(SQLite一本化)のデータが揃うまで全ページを準備中案内へ。
# 再開するときはこのルールを削除する。maintenance.html は自己完結
# (外部アセットはGoogle Fontsのみ)なので force=true で全パスを奪ってよい。
[[redirects]]
  from = "/*"
  to = "/maintenance.html"
  status = 200
  force = true

# 拡張子なしURLでもアクセスできるように
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/result"
  to = "/result.html"
  status = 200

# キャッシュ設定: site.db(SQLite)は300秒。HTML/CSS/JSはファイル名固定のため
# 毎回サーバに確認(未変更は304で軽量、変更時は即反映)させる。
[[headers]]
  for = "/data/site.db"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# sql.js(WASM)はバージョン更新時のみ変わるので1日キャッシュ
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
