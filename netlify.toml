# Netlify config

[build]
  publish = "public"

# 拡張子なしURLでもアクセスできるように
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/result"
  to = "/result.html"
  status = 200

# キャッシュ設定: JSONは300秒。HTML/CSS/JSはファイル名固定のため
# 毎回サーバに確認(未変更は304で軽量、変更時は即反映)させる。
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
