# Netlify config

[build]
  publish = "public"

# 拡張子なしURLでもアクセスできるように
[[redirects]]
  from = "/bias"
  to = "/bias.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/result"
  to = "/result.html"
  status = 200

[[redirects]]
  from = "/reality"
  to = "/reality.html"
  status = 200

# キャッシュ設定: site.db(SQLite)は300秒。HTML/CSS/JSはファイル名固定のため
# 毎回サーバに確認(未変更は304で軽量、変更時は即反映)させる。
[[headers]]
  for = "/data/site.db"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# gzip版(通常はこちらが使われる。ブラウザ側でDecompressionStream解凍)
[[headers]]
  for = "/data/site.db.gz"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
    Content-Type = "application/gzip"

# sql.js(WASM)はバージョン更新時のみ変わるので1日キャッシュ
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
